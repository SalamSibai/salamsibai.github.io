
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Compatible Background Video</title>
    
    <style>
        /* Reset margins and ensure full height */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }

        /* Container to hold both the video and the content */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh; /* Full viewport height */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000; /* Fallback color while video loads */
        }

        /* The Background Video CSS */
        #background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* This forces the video to fill the screen without squishing */
            z-index: 0; /* Keeps the video in the back */
        }

        /* The Content CSS */
        .content {
            position: relative;
            z-index: 1; /* Places your text ON TOP of the video */
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4); /* Optional: dark overlay to make text readable */
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        
        <video id="background-video" autoplay loop muted playsinline poster="fallback-image.jpg">
            <source src="your-video.mp4" type="video/mp4">
            
            Your browser does not support HTML5 video.
        </video>

        <div class="content">
            <h1>It Works!</h1>
            <p>This background video will autoplay smoothly on iPhones.</p>
        </div>

    </section>

</body>
</html>
